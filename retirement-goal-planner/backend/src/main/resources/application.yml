spring:
    
    application:
        name: retirement_tracker
        version: 1.0.0
    output:
        ansi:
            enabled: always

    datasource:
        url: ${DB_URL}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
    
    jpa:
        hibernate:
            ddl-auto: update

    config:
        import: "optional:file:.env[.properties]"

    security:
        oauth2:
            client:
                registration:
                    google:
                        client-id: ${CLIENT-ID}
                        client-secret: ${CLIENT-SECRET}
                        scope:
                            - openid
                            - profile
                            - email
                        redirect-uri: ${REDIRECT-URI} 

server:
    port: 8080


