spring:
    output:
        ansi:
            enabled: always

    datasource:
        url: jdbc:postgresql://${RDS_HOSTNAME}:${RDS_PORT}/${RDS_DB_NAME}
        username: ${RDS_USERNAME}
        password: ${RDS_PASSWORD}
        driver-class-name: org.postgresql.Driver
    
    jpa:
        database-platform: org.hibernate.dialect.PostgreSQLDialect
        hibernate:
            ddl-auto: update

server:
    port: 8080
    servlet:
        session:
            cookie:
                same-site: none
                secure: true
